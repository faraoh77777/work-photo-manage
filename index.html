<script>
// ── 인증 체크 ─────────────────────────────────────────
(function(){
  if(!localStorage.getItem('member_id')){location.href='login.html';return;}
  var n=localStorage.getItem('member_name')||'';
  var c=localStorage.getItem('member_company')||'';
  if(n||c) document.getElementById('hdrUser').textContent=(n||'')+(c?' · '+c:'');
})();
function logout(){
  ['member_id','member_name','member_company','member_project','member_phone','member_category','senderName'].forEach(function(k){localStorage.removeItem(k);});
  location.href='login.html';
}

async function withdrawMember(){
  if(!confirm('정말 회원 탈퇴하시겠습니까? 계정 정보가 삭제되며 되돌릴 수 없습니다.'))return;
  var memberId=localStorage.getItem('member_id');
  if(memberId&&sbClient){
    try{ await sbClient.from('members').delete().eq('id',memberId); }
    catch(e){ console.error('회원 탈퇴 실패',e); showTE('회원 탈퇴 실패: '+(e.message||e)); return; }
  }
  ['member_id','member_name','member_company','member_project','member_phone','member_category','senderName'].forEach(function(k){localStorage.removeItem(k);});
  location.href='login.html';
}

// ── Supabase ──────────────────────────────────────────
var SUPABASE_URL='https://dteljgmdbfyxubtpogcj.supabase.co';
var SUPABASE_KEY='sb_publishable_VC2GcwpxDg_zVbFgOnpfzg__sictyqc';
var sbClient=null;
try{ sbClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY); }
catch(e){ console.error('Supabase 초기화 실패',e); }

async function sendToSupabase(){
  if(!savedPhotos.length){ showTE("전송할 사진이 없습니다."); return; }
  if(!sbClient){ showTE("Supabase 연결 실패"); return; }
  var btn=document.getElementById('sendBtn');
  btn.disabled=true;
  var total=savedPhotos.length, success=0, lastErr='';
  for(var i=0;i<total;i++){
    var p=savedPhotos[i];
    btn.textContent='⏳ 전송 중... ('+(i+1)+'/'+total+'장)';
    try{
      var filePath=(p.info.date||'nodate')+'/'+p.filename;
      var storageRes=await sbClient.storage.from('work-photo').upload(filePath,p.blob,{contentType:'image/jpeg',upsert:true});
      if(storageRes.error){ lastErr='[Storage] '+storageRes.error.message; continue; }
      var photoUrl=sbClient.storage.from('work-photo').getPublicUrl(filePath).data.publicUrl;
      var insertData={
        date:p.info.date||'', time:p.info.time||'', tag:p.info.tag||'',
        cat:p.info.cat||'', loc:p.info.loc||'', work_type:p.info.wt||'',
        note:p.info.note||'', photo_url:photoUrl,
        sender:localStorage.getItem('member_name')||localStorage.getItem('senderName')||''
      };
      var dbRes=await sbClient.from('work_photos').insert(insertData);
      if(dbRes.error){
        // sender 컬럼 미존재 시 sender 없이 재시도
        if(dbRes.error.message&&dbRes.error.message.toLowerCase().includes('sender')){
          var d2=Object.assign({},insertData); delete d2.sender;
          var dbRes2=await sbClient.from('work_photos').insert(d2);
          if(dbRes2.error){ lastErr='[DB] '+dbRes2.error.message; continue; }
        } else { lastErr='[DB] '+dbRes.error.message; continue; }
      }
      success++;
    }catch(e){ lastErr=e.message||String(e); }
  }
  btn.disabled=false;
  btn.textContent='☁️ 전송하기';
  if(success===total){
    showT('✅ '+success+'장 전송 완료! 저장 중...');
    autoSaveToDevice(savedPhotos.slice());
  } else if(success>0){
    showTE('⚠️ '+success+'/'+total+'장 성공 — '+lastErr);
  } else {
    showTE('❌ 전송 실패: '+lastErr);
  }
}

var dirHandle=null;
var isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

(function(){
  var btn=document.getElementById('folderBtn');
  if(isMobile) btn.style.display='none';
})();

async function pickSaveFolder(){
  if(!window.showDirectoryPicker){showTE('Chrome/Edge 데스크탑 전용 기능입니다.');return;}
  try{
    dirHandle=await window.showDirectoryPicker({mode:'readwrite',startIn:'downloads'});
    document.getElementById('folderBtn').textContent='📁 '+dirHandle.name;
    showT('저장 폴더: '+dirHandle.name);
  }catch(e){
    if(e.name!=='AbortError') showTE('폴더 선택 실패: '+e.message);
  }
}

async function autoSaveToDevice(photos){
  if(dirHandle&&!isMobile){
    var cnt=0, lastErr='';
    for(var i=0;i<photos.length;i++){
      var p=photos[i];
      try{
        var ab=await new Promise(function(res,rej){
          var fr=new FileReader();fr.onload=function(e){res(e.target.result);};fr.onerror=rej;
          fr.readAsArrayBuffer(p.blob);
        });
        var fh=await dirHandle.getFileHandle(p.filename,{create:true});
        var w=await fh.createWritable();
        await w.write(new Uint8Array(ab));
        await w.close();
        cnt++;
      }catch(e){
        lastErr=e.message||String(e);
        console.error('파일저장실패',p.filename,e);
      }
    }
    if(cnt>0){showT('📁 '+dirHandle.name+'에 '+cnt+'장 저장 완료!');setTimeout(resetApp,2000);}
    else{showTE('폴더 저장 실패: '+lastErr);downloadAll(photos);setTimeout(resetApp,photos.length*300+2000);}
  } else {
    downloadAll(photos);
    setTimeout(resetApp,photos.length*300+2000);
  }
}

function resetApp(){
  savedPhotos=[];
  lockedInfo=null;
  document.getElementById('fileInput').value='';
  document.getElementById('inTag').value='';
  document.getElementById('inNote').value='';
  document.getElementById('wtNew').checked=true;
  document.getElementById('inLoc').value='SCC';
  updateList();
  resetCam();
  dbClearAll().catch(function(e){console.error("저장소 초기화 실패",e);});
}

function downloadAll(photos){
  photos.forEach(function(p, i){
    setTimeout(function(){
      var a=document.createElement('a');
      a.href=p.dataUrl; a.download=p.filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }, i*300);
  });
}

var DB_NAME="work-photo-db", DB_VERSION=1, STORE_NAME="photos", dbPromise=null;
function openDB(){
  if(dbPromise)return dbPromise;
  dbPromise=new Promise(function(resolve,reject){
    var req=indexedDB.open(DB_NAME,DB_VERSION);
    req.onupgradeneeded=function(){req.result.createObjectStore(STORE_NAME,{keyPath:"id",autoIncrement:true});};
    req.onsuccess=function(){resolve(req.result);};
    req.onerror=function(){reject(req.error);};
  });
  return dbPromise;
}
async function dbAddPhoto(p){
  var db=await openDB();
  return new Promise(function(resolve,reject){
    var tx=db.transaction(STORE_NAME,"readwrite");
    var req=tx.objectStore(STORE_NAME).add({filename:p.filename,blob:p.blob,info:p.info});
    req.onsuccess=function(){resolve(req.result);};
    req.onerror=function(){reject(req.error);};
  });
}
async function dbDeletePhoto(id){
  if(id==null)return;
  var db=await openDB();
  return new Promise(function(resolve,reject){
    var tx=db.transaction(STORE_NAME,"readwrite");
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete=function(){resolve();};
    tx.onerror=function(){reject(tx.error);};
  });
}
async function dbClearAll(){
  var db=await openDB();
  return new Promise(function(resolve,reject){
    var tx=db.transaction(STORE_NAME,"readwrite");
    tx.objectStore(STORE_NAME).clear();
    tx.oncomplete=function(){resolve();};
    tx.onerror=function(){reject(tx.error);};
  });
}
async function restoreSavedPhotos(){
  try{
    var db=await openDB();
    var rows=await new Promise(function(resolve,reject){
      var tx=db.transaction(STORE_NAME,"readonly");
      var req=tx.objectStore(STORE_NAME).getAll();
      req.onsuccess=function(){resolve(req.result);};
      req.onerror=function(){reject(req.error);};
    });
    if(!rows.length)return;
    savedPhotos=rows.map(function(r){
      return {dataUrl:URL.createObjectURL(r.blob),filename:r.filename,blob:r.blob,info:r.info,dbId:r.id};
    });
    updateList();
    showT("미전송 사진 "+savedPhotos.length+"장 복원됨");
  }catch(e){console.error("사진 복원 실패",e);}
}

// ── 후면 카메라 실시간 촬영 (비율 선택 가능) ───────────
var camStream=null,camTrack=null;
var RATIO_VALUES={"6:7":6/7,"16:9":16/9};
var RATIO_BTN_IDS={"6:7":"ratioBtn67","16:9":"ratioBtn169"};
function normRatioMode(mode){return RATIO_VALUES.hasOwnProperty(mode)?mode:"6:7";}
var captureRatio=RATIO_VALUES[normRatioMode(localStorage.getItem("capture_ratio"))];
function setCaptureRatio(mode){
  mode=normRatioMode(mode);
  captureRatio=RATIO_VALUES[mode];
  localStorage.setItem("capture_ratio",mode);
  Object.keys(RATIO_BTN_IDS).forEach(function(m){
    document.getElementById(RATIO_BTN_IDS[m]).classList.toggle("active",m===mode);
  });
  if(document.getElementById("camModal").style.display==="flex")sizeCamViewport();
}
(function(){
  var mode=normRatioMode(localStorage.getItem("capture_ratio"));
  Object.keys(RATIO_BTN_IDS).forEach(function(m){
    document.getElementById(RATIO_BTN_IDS[m]).classList.toggle("active",m===mode);
  });
})();
function sizeCamViewport(){
  var vw=window.innerWidth,vh=window.innerHeight;
  var w,h;
  if(vw/vh>captureRatio){h=vh;w=Math.round(h*captureRatio);}
  else{w=vw;h=Math.round(w/captureRatio);}
  var vp=document.getElementById("camViewport");
  vp.style.width=w+"px";
  vp.style.height=h+"px";
}
window.addEventListener("resize",function(){
  if(document.getElementById("camModal").style.display==="flex")sizeCamViewport();
});
window.addEventListener("orientationchange",function(){
  setTimeout(function(){
    if(document.getElementById("camModal").style.display==="flex")sizeCamViewport();
  },250);
});
async function openCamera(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    document.getElementById("fileInput").click();
    return;
  }
  var stream=null;
  var videoConstraints={facingMode:{exact:"environment"},aspectRatio:{ideal:captureRatio},width:{ideal:1920},height:{ideal:1920}};
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:videoConstraints,audio:false});
  }catch(e1){
    try{
      videoConstraints.facingMode="environment";
      stream=await navigator.mediaDevices.getUserMedia({video:videoConstraints,audio:false});
    }catch(e2){
      try{
        stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
      }catch(e3){
        document.getElementById("fileInput").click();
        return;
      }
    }
  }
  camStream=stream;
  camTrack=stream.getVideoTracks()[0]||null;
  document.getElementById("camVideo").srcObject=stream;
  document.getElementById("camRatioBadge").textContent=normRatioMode(localStorage.getItem("capture_ratio"));
  sizeCamViewport();
  document.getElementById("camModal").style.display="flex";
}
function closeCamera(){
  if(camStream){camStream.getTracks().forEach(function(t){t.stop();});camStream=null;camTrack=null;}
  document.getElementById("camModal").style.display="none";
}
function playShutterSound(){
  try{
    var ctx=new (window.AudioContext||window.webkitAudioContext)();
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.type="square";
    o.frequency.setValueAtTime(1200,ctx.currentTime);
    g.gain.setValueAtTime(0.35,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.09);
    o.connect(g);g.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime+0.09);
    o.onended=function(){ctx.close();};
  }catch(e){}
}
async function captureShot(){
  var video=document.getElementById("camVideo");
  if(!video.videoWidth)return;
  playShutterSound();
  var cv=null;
  if(window.ImageCapture&&camTrack){
    try{
      var imageCapture=new ImageCapture(camTrack);
      var blob=await imageCapture.takePhoto();
      var bitmap=await createImageBitmap(blob);
      cv=document.createElement("canvas");
      cv.width=bitmap.width;cv.height=bitmap.height;
      cv.getContext("2d").drawImage(bitmap,0,0);
    }catch(e){console.error("고화질 촬영 실패, 미리보기 프레임으로 대체",e);cv=null;}
  }
  if(!cv){
    cv=document.createElement("canvas");
    cv.width=video.videoWidth;cv.height=video.videoHeight;
    cv.getContext("2d").drawImage(video,0,0,cv.width,cv.height);
  }
  closeCamera();
  var now=new Date();
  processCapturedFrame(cv,now.toISOString().slice(0,10),now.toTimeString().slice(0,5));
}

function getWorkLabel(){

var CROP_TARGET_W=1600;
function crop34(img){
  var sW=img.width,sH=img.height,r=captureRatio,cW,cH,ox=0,oy=0;
  if(sW/sH>r){cH=sH;cW=Math.round(sH*r);ox=Math.round((sW-cW)/2);}
  else{cW=sW;cH=Math.round(sW/r);oy=Math.round((sH-cH)/2);}
  var outW=CROP_TARGET_W,outH=Math.round(outW/r);
  var c=document.createElement("canvas");
  c.width=outW;c.height=outH;c._w=outW;c._h=outH;
  c.getContext("2d").drawImage(img,ox,oy,cW,cH,0,0,outW,outH);
  return c;
}

function loadImg(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var autoDate="",autoTime="";
    try{
      var exifObj=piexif.load(ev.target.result);
      var dt=exifObj["Exif"]&&exifObj["Exif"][piexif.ExifIFD.DateTimeOriginal];
      if(dt&&dt.length>=16){
        autoDate=dt.slice(0,10).replace(/:/g,"-");
        autoTime=dt.slice(11,16);
      }
    }catch(ex){}
    if(!autoDate){
      var now=new Date();
      autoDate=now.toISOString().slice(0,10);
      autoTime=now.toTimeString().slice(0,5);
    }
    var img=new Image();
    img.onload=function(){processCapturedFrame(img,autoDate,autoTime);};
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value="";
}

function processCapturedFrame(source,autoDate,autoTime){
  var loadedImg=crop34(source);
  var catEl=document.getElementById("inCat");
  lockedInfo={
    date:autoDate, time:autoTime,
    tag:document.getElementById("inTag").value.trim(),
    cat:catEl.options[catEl.selectedIndex].text,
    loc:document.getElementById("inLoc").value,
    note:document.getElementById("inNote").value.trim()||"-",
    wt:getWorkLabel()
  };
  // 캠박스에 촬영된 이미지 표시
  document.getElementById("camBox").innerHTML=
    '<img src="'+loadedImg.toDataURL()+'" style="width:100%;height:100%;object-fit:cover;border-radius:10px;"/>'
    +'<div class="corner tl"></div><div class="corner tr"></div>'
    +'<div class="corner bl"></div><div class="corner br"></div>';

  // 바로 목록에 추가
  autoAddPhoto(loadedImg);
}

function renderCanvas(loadedImg){
  var cv=document.createElement("canvas");
  var W=loadedImg._w,H=loadedImg._h;
  cv.width=W;cv.height=H;
  var ctx=cv.getContext("2d");
  ctx.drawImage(loadedImg,0,0);

  var label=lockedInfo.wt==="신규"?lockedInfo.cat:"["+lockedInfo.wt+"] "+lockedInfo.cat;
  var memberName=localStorage.getItem("member_name")||"";
  var lines=[label, lockedInfo.tag||"-", lockedInfo.loc];
  if(memberName) lines.push(memberName);
  lines.push(lockedInfo.date+"  "+lockedInfo.time);
  if(lockedInfo.note&&lockedInfo.note!=="-") lines.push(lockedInfo.note);

  var fs=Math.max(20,Math.round(H*0.031));
  var padX=Math.round(W*0.022), padY=Math.round(fs*0.55);
  ctx.font="bold "+fs+"px Arial,sans-serif";
  var maxTxtW=0;
  lines.forEach(function(l){maxTxtW=Math.max(maxTxtW,ctx.measureText(l).width);});
  while(fs>16&&maxTxtW>W*0.75){
    fs--;ctx.font="bold "+fs+"px Arial,sans-serif";maxTxtW=0;
    lines.forEach(function(l){maxTxtW=Math.max(maxTxtW,ctx.measureText(l).width);});
  }
  var lh=Math.round(fs*1.3);
  padX=Math.round(W*0.022);padY=Math.round(fs*0.55);
  var boxW=maxTxtW+padX*2,boxH=lines.length*lh+padY*2;
  ctx.fillStyle="rgba(0,0,0,0.6)";
  ctx.fillRect(W-boxW,H-boxH,boxW,boxH);
  ctx.textBaseline="top";ctx.textAlign="right";
  ctx.font="bold "+fs+"px Arial,sans-serif";
  ctx.lineJoin="round";ctx.miterLimit=2;
  ctx.lineWidth=Math.max(2,Math.round(fs*0.12));
  ctx.strokeStyle="#000000";
  ctx.fillStyle="#FFFFFF";
  lines.forEach(function(line,i){
    var x=W-padX,y=(H-boxH)+padY+i*lh;
    ctx.strokeText(line,x,y);
    ctx.fillText(line,x,y);
  });
  return cv;
}

function sanitizeForFilename(str){
  return str?String(str).trim()
    .replace(/[^\x00-\x7F]/g,"")
    .replace(/[\\\/:*?"<>|&]/g,"")
    .replace(/\s+/g,"_")
    .replace(/^[_\-]+|[_\-]+$/g,"")
    .slice(0,30):"";
}

var WT_EN={'신규':'new','작업전':'mod-before','작업후':'mod-after'};

function buildFileName(idx){
  var wt=WT_EN[lockedInfo.wt]||sanitizeForFilename(lockedInfo.wt)||'work';
  var cat=sanitizeForFilename(lockedInfo.cat)||'etc';
  var tag=sanitizeForFilename(lockedInfo.tag)||'NONAME';
  var loc=sanitizeForFilename(lockedInfo.loc)||'LOC';
  var note=sanitizeForFilename(lockedInfo.note);
  var parts=["WORK",
    (lockedInfo.date||"").replace(/-/g,""),
    (lockedInfo.time||"").replace(":",""),
    wt, cat, tag, loc];
  if(note) parts.push(note);
  parts.push(idx);
  var fname=parts.join("_")+".jpg";
  return fname.length>200?fname.slice(0,196)+".jpg":fname;
}

function buildInfoText(info){
  return "["+info.wt+"] "+info.cat+"  기기번호:"+info.tag
    +"  날짜:"+info.date+" "+info.time+"  구역:"+info.loc+"  특이사항:"+info.note;
}
function strToXPBytes(str){
  var bytes=[],s=String(str||"");
  for(var i=0;i<s.length;i++){var c=s.charCodeAt(i);bytes.push(c&0xff,(c>>8)&0xff);}
  bytes.push(0,0);return bytes;
}
function strToUserCommentBinary(str){
  var bin="",s=String(str||"");
  for(var i=0;i<s.length;i++){var c=s.charCodeAt(i);bin+=String.fromCharCode(c&0xff)+String.fromCharCode((c>>8)&0xff);}
  return "UNICODE "+bin;
}
function embedExif(dataUrl,info){
  try{
    if(typeof piexif==="undefined")return dataUrl;
    var ft=buildInfoText(info);
    var z={};
    z[piexif.ImageIFD.XPTitle]=strToXPBytes(info.tag);
    z[piexif.ImageIFD.XPSubject]=strToXPBytes(info.cat);
    z[piexif.ImageIFD.XPComment]=strToXPBytes(ft);
    z[piexif.ImageIFD.XPKeywords]=strToXPBytes([info.wt,info.loc].join(";"));
    var ex={};
    ex[piexif.ExifIFD.UserComment]=strToUserCommentBinary(ft);
    var dd=(info.date||"").replace(/-/g,":");
    var dt=info.time||"00:00";if(dt.length===5)dt+=":00";
    if(dd)ex[piexif.ExifIFD.DateTimeOriginal]=dd+" "+dt;
    return piexif.insert(piexif.dump({"0th":z,"Exif":ex}),dataUrl);
  }catch(e){return dataUrl;}
}

function autoAddPhoto(loadedImg){
  var cv=renderCanvas(loadedImg);
  var fname=buildFileName(savedPhotos.length+1);
  var rawDataUrl=cv.toDataURL("image/jpeg",0.92);
  var info={
    date:lockedInfo.date,time:lockedInfo.time,
    tag:lockedInfo.tag||"-",cat:lockedInfo.cat,
    loc:lockedInfo.loc,note:lockedInfo.note,wt:lockedInfo.wt
  };
  var dataUrl=embedExif(rawDataUrl,info);
  var byteStr=atob(dataUrl.split(",")[1]);
  var ab=new ArrayBuffer(byteStr.length);
  var ia=new Uint8Array(ab);
  for(var i=0;i<byteStr.length;i++)ia[i]=byteStr.charCodeAt(i);
  var blob=new Blob([ab],{type:"image/jpeg"});
  var photo={dataUrl:dataUrl,filename:fname,blob:blob,info:info};
  savedPhotos.push(photo);
  updateList();
  showT("추가 완료! 총 "+savedPhotos.length+"장");
  setTimeout(resetCam,800);
  dbAddPhoto(photo).then(function(id){photo.dbId=id;}).catch(function(e){console.error("사진 저장 실패",e);});
}

function updateList(){
  var cnt=savedPhotos.length;
  document.getElementById("photoCount").textContent=cnt;
  document.getElementById("listCard").style.display=cnt>0?"block":"none";
  var list=document.getElementById("savedList");
  var html="";
  savedPhotos.forEach(function(p,i){
    html+='<div class="saved-item">'
      +'<img src="'+p.dataUrl+'"/>'
      +'<button class="del-btn" onclick="removePhoto('+i+')">&#10005;</button>'
      +'<span class="num-badge">'+(i+1)+'</span>'
      +'</div>';
  });
  list.innerHTML=html||'<div style="grid-column:span 4;text-align:center;padding:12px;color:#A0BBD4;font-size:13px;">촬영된 사진이 없습니다</div>';
}

window.removePhoto=function(idx){
  var p=savedPhotos[idx];
  savedPhotos.splice(idx,1);
  updateList();
  if(p&&p.dbId!=null)dbDeletePhoto(p.dbId).catch(function(e){console.error("사진 삭제 실패",e);});
};

  document.getElementById("fileInput").value="";

function showT(m){var t=document.getElementById("toast");t.textContent=m;t.style.display="block";setTimeout(function(){t.style.display="none";},2500);}
function showTE(m){var t=document.getElementById("toastE");t.textContent=m;t.style.display="block";setTimeout(function(){t.style.display="none";},7000);}

// ── 음성 인식 (STT) ──────────────────────────────────
var SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
var activeRec=null;

function startSTT(fieldId,btnId){
  if(!SpeechRecognition){showTE("이 브라우저는 음성 인식을 지원하지 않습니다.");return;}
  var btn=document.getElementById(btnId);
  if(activeRec){activeRec.stop();return;}
  var rec=new SpeechRecognition();
  rec.lang="ko-KR";rec.interimResults=true;rec.maxAlternatives=1;
  activeRec=rec;btn.classList.add("listening");btn.textContent="⏹";
  rec.onresult=function(e){
    var t="";
    for(var i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;
    var el=document.getElementById(fieldId);
    el.value=fieldId==="inTag"?t.toUpperCase():t;
    if(e.results[e.results.length-1].isFinal)showT("음성 입력 완료");
  };
  rec.onerror=function(e){if(e.error!=="aborted")showTE("음성 오류: "+e.error);_stopSTT(btn);};
  rec.onend=function(){_stopSTT(btn);};
  rec.start();
}
function _stopSTT(btn){activeRec=null;btn.classList.remove("listening");btn.textContent="🎤";}
